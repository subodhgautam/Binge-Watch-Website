<body class="bg-black">




    <div class="main bg-hero bg-center bg-no-repeat bg-cover min-h-[70vh] text-white relative w-full flex flex-col">

        <nav class="flex justify-between max-w-[80vw] h-9 mx-auto w-full z-10 relative ">

            </span>

            </span>

            <span>
                <h3 class="text-[12px] md:text-[18px]"> Ready to watch? Enter your email to create or restart your
                    membership.</h3>
            </span>
            <div class="enter">

                <input type="email" name="email" id="email" placeholder="Email Address" class="p-3 rounded-2xl outline-none focus:border "> 
                <button id="get_started_btn" class="btn my-4 p-3 text-[16px]">Get Started &nbsp; &gt; </button>

            </div>
        </div>


    </div>

    <div class="separator h-1.5 w-full bg-gray-600/40 "></div>
